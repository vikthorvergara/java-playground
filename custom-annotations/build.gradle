plugins {
    id 'java'
    id 'application'
}

group = 'com.github.vikthorvergara'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

java {
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

task runTesting(type: JavaExec) {
    mainClass = 'com.github.vikthorvergara.annotations.testing.MiniTestFrameworkPOC'
    classpath = sourceSets.main.runtimeClasspath
}

task runJson(type: JavaExec) {
    mainClass = 'com.github.vikthorvergara.annotations.json.JsonSerializerPOC'
    classpath = sourceSets.main.runtimeClasspath
}

task runRest(type: JavaExec) {
    mainClass = 'com.github.vikthorvergara.annotations.rest.RestScannerPOC'
    classpath = sourceSets.main.runtimeClasspath
}

task runOrm(type: JavaExec) {
    mainClass = 'com.github.vikthorvergara.annotations.orm.MiniOrmPOC'
    classpath = sourceSets.main.runtimeClasspath
}

task runValidation(type: JavaExec) {
    mainClass = 'com.github.vikthorvergara.annotations.validation.ValidationFrameworkPOC'
    classpath = sourceSets.main.runtimeClasspath
}

task runCli(type: JavaExec) {
    mainClass = 'com.github.vikthorvergara.annotations.cli.CliParserPOC'
    classpath = sourceSets.main.runtimeClasspath
}

task runRetry(type: JavaExec) {
    mainClass = 'com.github.vikthorvergara.annotations.retry.RetryMechanismPOC'
    classpath = sourceSets.main.runtimeClasspath
}
